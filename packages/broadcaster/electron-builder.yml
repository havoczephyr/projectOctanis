appId: com.octanis.broadcaster
productName: Octanis Broadcaster
directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - "!node_modules"

# Include native modules and binaries that electron-vite externalizes
extraResources:
  - from: ../../node_modules/@discordjs/opus
    to: node_modules/@discordjs/opus
    filter:
      - "**/*.node"
      - "prebuild/**/*"
      - package.json
  - from: ../../node_modules/ffmpeg-static
    to: node_modules/ffmpeg-static
    filter:
      - "ffmpeg"
      - "ffmpeg.exe"
      - package.json
  - from: ../../node_modules/@ffprobe-installer
    to: node_modules/@ffprobe-installer
    filter:
      - "**/ffprobe"
      - "**/ffprobe.exe"
      - "**/package.json"

# Include ws and other runtime deps that get externalized
asarUnpack:
  - "node_modules/@discordjs/opus/**"
  - "node_modules/ffmpeg-static/**"

npmRebuild: true

mac:
  category: public.app-category.music
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-${version}-win-${arch}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  category: Audio
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"

publish:
  provider: github
  releaseType: release
